# Редирект HTTP -> HTTPS
server {
    listen 80;
    server_name ollama.kvando.tech;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name ollama.kvando.tech;

    ssl_certificate /etc/letsencrypt/live/ollama.kvando.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ollama.kvando.tech/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    # SPA — все маршруты отдают index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Проксирование API на бэкенд
    location /api/ {
        proxy_pass http://bot:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Кэширование статики
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}